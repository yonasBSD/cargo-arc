<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="310" height="220" viewBox="0 0 310 220">
  <style>
    .crate { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
