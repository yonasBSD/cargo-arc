    <line class="tree-line" x1="50" y1="40" x2="50" y2="60"/>
    <line class="tree-line" x1="50" y1="60" x2="40" y2="60"/>
    <line class="tree-line" x1="50" y1="40" x2="50" y2="90"/>
    <line class="tree-line" x1="50" y1="90" x2="40" y2="90"/>
    <line class="tree-line" x1="50" y1="40" x2="50" y2="120"/>
    <line class="tree-line" x1="50" y1="120" x2="40" y2="120"/>
    <line class="tree-line" x1="50" y1="40" x2="50" y2="150"/>
    <line class="tree-line" x1="50" y1="150" x2="40" y2="150"/>
  </g>
  <g id="nodes">
