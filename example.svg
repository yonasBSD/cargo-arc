    <text class="label" x="50" y="64">render</text>
    <rect class="module" x="40" y="80" width="80" height="20" rx="2"/>
    <text class="label" x="50" y="94">analyze</text>
    <rect class="module" x="40" y="110" width="80" height="20" rx="2"/>
    <text class="label" x="50" y="124">cli</text>
    <rect class="module" x="40" y="140" width="80" height="20" rx="2"/>
    <text class="label" x="50" y="154">graph</text>
    <rect class="crate" x="20" y="170" width="120" height="24" rx="3"/>
    <text class="label" x="30" y="186">cargo-arc</text>
  </g>
  <g id="dependencies">
  </g>
